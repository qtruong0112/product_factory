server:
  port: 8080

spring:
  application:
    name: product-factory
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product_factory}
    username: ${DB_USER:pf_user}
    password: ${DB_PASSWORD:pf_pass}
  jpa:
    hibernate:
      ddl-auto: validate          # schema do Flyway quản lý, JPA chỉ kiểm tra
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# CORS cho frontend Vite (localhost:5173) và bản build tĩnh
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    org.hibernate.SQL: warn
